<head>

    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th,
        td {
            padding: 15px;
            text-align: center;
            font-size: larger;
        }

        h1 {
            text-decoration: underline dotted;
            margin-top: 30px;
        }
        h1:hover{
            font-family: cursive;
        }

        th {
            background-color: bisque;
        }
        th::after{
            content:"🌍";
        }
        td::before{
            content:"😶‍🌫️";
        }

        div {
            margin: auto;
            box-shadow: 5px 5px 20px rgb(29, 29, 29);
            max-width: 500px;
            border-radius: 10px;
            padding: 10px
        }

        tbody tr:nth-child(odd) {
            background-color: grey;
        }

        tbody td:hover{
                background-color: skyblue;
                color: black;
                border-radius: 10px;
                transition:transform 1s ease-in-out;
                /* transform:rotateY(360deg); */
                /* transform:scale(1.5) */
            /* transform:translate(30px,30px); */
            transform:perspective(60px) rotateY(360deg)
        }
    </style>
</head>
