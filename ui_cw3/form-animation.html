<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0;
            padding:0;
            display:flex;
            justify-content: center;
            align-items:center;
            background:linear-gradient(120deg,rgb(8, 59, 40),rgb(19, 97, 55),rgba(57, 26, 2, 0.834));
            background-size: 150% 150%;
            animation: gradient 2s ease infinite;
        }
        @keyframes gradient{
            0%,100%{
                background-position:0% 50%;
            }
            50%{
                background-position:100%;
            }
        }
        .main{
            width:50%;
            height:500px;
            display:flex;
            justify-content: center;
            align-items:center;
            background-color: rgb(77, 141, 103);
            flex-direction: column;
            border-radius: 10px;
            margin-top: 10%;
            box-shadow: 3px 3px 32px black;
        }
        h1:hover{
            font-family: cursive;
            transition: transform 1s ease;
            transform: scale(1.1);
        }
        form{
            display:flex;
           flex-direction: column;
        }
        .div1{
            display: flex;
            flex-direction: row;
        }
       label{
        font-size: 30px;
       }
       input{
        width:100%;
        height:30px;
        font-size: 25px;
        margin-left: 10px;

        border:1 px black solid;
        border-radius: 5px;
       }
       input:hover{
        transition: transform 1s ease-in-out;
        transform: scale(1.1);
       }
       button{
        background-color: blue;
        color:white;
        width:80px;
        height:50px;
        font-size: 20px;
        border-radius: 5px;        ;
       }
       button:hover{
        background-color:rgb(176, 238, 247);
        color:black;
        transition:transform 3s ease;
        transform:scale(1.1);
       }
       @media(max-width:500px){
        .main{
            width:100%;
            height:100%;
        }
        .div1{
            display: flex;
            flex-direction: column;
        }

       }
        
    </style>
</head>
<body>
    <div class="main">
        <h1>Registration Form</h1>
        <form>
            <div class="div1">
                <label>Name:</label>
            <input type="text">
            </div>
            <br><br>
            <div class="div1">
                 <label>Address:</label>
            <input type="text" >
            </div>
            <br><br>
            <div class="div1">
                 <label>Age:</label>
            <input type="text"  >
            </div>
            <br><br>
            <button>Submit</button>
        </form>
    </div>
</body>
</html>
