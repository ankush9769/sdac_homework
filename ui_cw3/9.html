<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .v1{
            display: block;
        }
        .v2{
            display: none;
        }
    @media (orientation: portrait) {
        .v1{
            display: none;
        }
        .v2{
            height: 840px;
            display: block;
        }
        
    }
    </style>
</head>
<body>
    <video class="v1" src="paris.mp4" autoplay loops muted></video>
    <video class="v2" src="vertical.mp4" autoplay loops muted></video>
</body>
</html>
